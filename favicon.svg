<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="#0f0f0f"/>
  <rect width="64" height="64" rx="12" fill="none" stroke="#f5a623" stroke-width="2" opacity="0.3"/>
  <!-- Dumbbell shape with chart integrated -->
  <!-- Left plate -->
  <rect x="6" y="20" width="8" height="24" rx="3" fill="#f5a623"/>
  <!-- Right plate -->
  <rect x="50" y="20" width="8" height="24" rx="3" fill="#f5a623"/>
  <!-- Bar -->
  <rect x="12" y="30" width="40" height="4" rx="2" fill="#f5a623" opacity="0.4"/>
  <!-- Mini chart on the bar -->
  <rect x="18" y="26" width="5" height="8" rx="1" fill="#f5a623" opacity="0.6"/>
  <rect x="25" y="22" width="5" height="12" rx="1" fill="#f5a623" opacity="0.7"/>
  <rect x="32" y="18" width="5" height="16" rx="1" fill="#f5a623" opacity="0.85"/>
  <rect x="39" y="14" width="5" height="20" rx="1" fill="#f5a623"/>
</svg>
