<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>LOADOUT</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg"/>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg:       #0f0f0f;
      --surface:  #181818;
      --surface2: #202020;
      --border:   #2a2a2a;
      --border2:  #363636;
      --amber:    #f5a623;
      --amber-lo: #7a5010;
      --white:    #e6e6e6;
      --muted:    #5a5a5a;
      --muted2:   #888;
      --green:    #3d9970;
      --red:      #c0392b;
      --font:     'IBM Plex Mono', monospace;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html, body { background:var(--bg); color:var(--white); font-family:var(--font); min-height:100dvh; font-size:17px; font-weight:500; overscroll-behavior:none; }

    /* SCREENS */
    .screen { display:none; min-height:100dvh; flex-direction:column; }
    .screen.active { display:flex; }

    /* CENTERED (login / onboard) */
    .centered { flex:1; display:flex; flex-direction:column; justify-content:center; padding:40px 24px; max-width:420px; margin:0 auto; width:100%; }
    .c-logo { font-size:1.6rem; font-weight:600; letter-spacing:0.26em; color:var(--amber); margin-bottom:4px; }
    .c-sub  { font-size:0.72rem; color:var(--muted); letter-spacing:0.1em; margin-bottom:32px; line-height:1.7; }
    .c-title{ font-size:0.72rem; letter-spacing:0.18em; text-transform:uppercase; color:var(--white); margin-bottom:16px; }

    /* APP HEADER */
    .app-header {
      display:flex; justify-content:space-between; align-items:center;
      padding:16px 16px 12px; border-bottom:1px solid var(--border);
      max-width:480px; margin:0 auto; width:100%;
    }
    .logo { font-size:1.05rem; font-weight:600; letter-spacing:0.24em; color:var(--amber); }
    .hdr-right { font-size:0.68rem; color:var(--muted); letter-spacing:0.08em; cursor:pointer; }
    .hdr-right:hover { color:var(--white); }

    /* NAV */
    .nav { display:flex; border-bottom:1px solid var(--border); max-width:480px; margin:0 auto; width:100%; }
    .nav-btn {
      flex:1; padding:12px 0; font-family:var(--font); font-size:0.68rem;
      letter-spacing:0.16em; text-transform:uppercase; color:var(--muted);
      background:none; border:none; cursor:pointer;
      border-bottom:2px solid transparent; transition:color 0.15s; margin-bottom:-1px;
    }
    .nav-btn.active { color:var(--amber); border-bottom-color:var(--amber); }

    /* PANE */
    .pane { flex:1; overflow-y:auto; padding-bottom:90px; }
    .pane-inner { max-width:480px; margin:0 auto; width:100%; }

    /* SECTION LABEL */
    .slabel {
      font-size:0.64rem; letter-spacing:0.22em; text-transform:uppercase;
      color:var(--muted); padding:14px 16px 10px; border-bottom:1px solid var(--border);
    }

    /* FIELDS */
    .field { display:flex; flex-direction:column; gap:4px; margin-bottom:10px; }
    .field label, .flabel { font-size:0.64rem; letter-spacing:0.16em; text-transform:uppercase; color:var(--muted); }
    .finput {
      background:var(--surface2); border:1px solid var(--border2);
      color:var(--white); font-family:var(--font); font-size:0.95rem;
      padding:12px; border-radius:2px; outline:none; width:100%;
      transition:border-color 0.15s; -webkit-appearance:none;
    }
    .finput:focus { border-color:var(--amber); }
    .finput::placeholder { color:var(--muted); font-weight:400; }
    .finput.upper { text-transform:uppercase; letter-spacing:0.05em; }
    textarea.finput { resize:none; font-size:0.8rem; }
    .row2 { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .row3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
    .ms-row { display:flex; align-items:center; gap:6px; }
    .ms-row .ms-input { text-align:center; padding-left:4px; padding-right:4px; }
    .ms-row .ms-sep { color:var(--muted2); font-weight:600; padding:0 2px; }

    /* BUTTONS */
    .btn {
      font-family:var(--font); font-size:0.72rem; font-weight:500;
      letter-spacing:0.14em; text-transform:uppercase;
      border:none; border-radius:2px; padding:14px 18px; cursor:pointer; transition:opacity 0.15s;
    }
    .btn:active { opacity:0.7; }
    .btn-primary { background:var(--amber); color:#0f0f0f; width:100%; }
    .btn-primary:disabled { background:var(--amber-lo); color:#555; cursor:not-allowed; }
    .btn-ghost { background:none; border:1px solid var(--border2); color:var(--muted); }
    .btn-ghost:hover { color:var(--white); border-color:var(--muted); }
    .btn-full { width:100%; }
    .btn-sm { font-size:0.65rem; padding:10px 14px; }
    .btn-danger { border-color:var(--red); color:var(--red); }

    /* WORKOUT CARDS */
    .card {
      border:1px solid var(--border); border-radius:2px; margin:12px 16px;
      background:var(--surface); cursor:pointer; transition:border-color 0.15s;
    }
    .card:hover { border-color:var(--border2); }
    .card-head { display:flex; justify-content:space-between; align-items:center; padding:14px 16px 10px; }
    .card-left { display:flex; flex-direction:column; flex:1; min-width:0; }
    .card-name { font-size:0.95rem; font-weight:500; text-transform:uppercase; letter-spacing:0.06em; }
    .card-meta { font-size:0.68rem; color:var(--muted); }
    .card-menu-wrap { position:relative; }
    .card-menu-btn {
      background:none; border:none; color:var(--muted); cursor:pointer;
      font-size:1.4rem; padding:6px 10px; line-height:1; letter-spacing:2px;
    }
    .card-menu-btn:hover { color:var(--white); }
    .card-menu {
      display:none; position:absolute; right:0; top:100%; z-index:60;
      background:var(--surface); border:1px solid var(--border2); border-radius:2px;
      min-width:140px; overflow:hidden;
    }
    .card-menu.open { display:block; }
    .card-menu-item {
      display:block; width:100%; text-align:left; padding:12px 16px;
      font-family:var(--font); font-size:0.68rem; letter-spacing:0.12em; text-transform:uppercase;
      color:var(--muted2); background:none; border:none; cursor:pointer;
      border-bottom:1px solid var(--border);
    }
    .card-menu-item:last-child { border-bottom:none; }
    .card-menu-item:hover { color:var(--white); background:var(--surface2); }
    .card-menu-item.danger { color:var(--red); }
    .card-menu-item.danger:hover { background:rgba(192,57,43,0.1); }
    .card-chips { display:flex; flex-wrap:wrap; gap:6px; padding:0 16px 14px; }
    .chip {
      font-size:0.62rem; letter-spacing:0.1em; text-transform:uppercase;
      color:var(--muted2); border:1px solid var(--border); padding:4px 9px; border-radius:1px;
    }

    /* SESSION EXERCISES */
    .sex-block { border-bottom:1px solid var(--border); padding:16px 16px; }
    .sex-head { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:12px; }
    .sex-name { font-size:0.95rem; font-weight:500; text-transform:uppercase; letter-spacing:0.06em; }
    .sex-target { font-size:0.7rem; color:var(--muted); }
    .sex-target em { color:var(--amber); font-style:normal; }
    .reorder-mode .sex-block { display:flex; align-items:center; gap:12px; padding:14px 16px; background:var(--surface); border:1px solid var(--border2); border-radius:4px; margin:8px 0; }
    .reorder-mode .sex-block > :not(.drag-handle):not(.reorder-name) { display:none; }
    .reorder-mode .reorder-name { flex:1; font-size:0.95rem; font-weight:500; text-transform:uppercase; letter-spacing:0.06em; color:var(--white); }
    .drag-handle { display:none; font-size:1.3rem; color:var(--muted2); cursor:grab; user-select:none; touch-action:none; padding:4px 6px; }
    .reorder-mode .drag-handle { display:inline-block; }
    .sex-block.dragging { opacity:0.4; }
    .sex-block.drag-over { border-color:var(--amber); }
    #btnReorder.active { color:var(--amber); border-color:var(--amber); }
    .wc-card { margin:10px 12px; border:1px solid var(--border); border-radius:4px; background:var(--surface); overflow:hidden; }
    .wc-head { width:100%; display:flex; align-items:center; gap:10px; padding:14px 14px; background:transparent; border:none; color:var(--white); font-family:var(--font); font-size:0.78rem; font-weight:600; letter-spacing:0.12em; text-transform:uppercase; cursor:pointer; }
    .wc-head span:first-child { flex:1; text-align:left; }
    .wc-count { color:var(--muted2); font-weight:500; letter-spacing:0; }
    .wc-chev { color:var(--muted2); transition:transform 0.15s; }
    .wc-card.collapsed .wc-chev { transform:rotate(-90deg); }
    .wc-card.collapsed .wc-body { display:none; }
    .wc-body { padding:0 0 6px; }
    .wc-row { display:flex; align-items:center; gap:12px; padding:12px 14px; cursor:pointer; border-top:1px solid var(--border); }
    .wc-check { width:22px; height:22px; border:1px solid var(--border2); border-radius:3px; display:inline-flex; align-items:center; justify-content:center; color:var(--green); font-size:0.9rem; font-weight:700; flex-shrink:0; }
    .wc-row.checked .wc-check::before { content:'✓'; }
    .wc-row.checked .wc-check { border-color:var(--green); }
    .wc-row.checked .wc-label { color:var(--muted2); }
    .wc-label { flex:1; font-size:0.78rem; }
    .wc-label em { color:var(--muted2); font-style:normal; font-size:0.72rem; margin-left:6px; }
    .summary-row { display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--border); font-size:0.8rem; }
    .summary-row:last-child { border-bottom:none; }
    .summary-val { color:var(--amber); font-weight:600; }
    .summary-val.ok { color:var(--green); }
    .summary-val.no { color:var(--red); }

    .outcome-row { display:flex; gap:7px; margin-bottom:8px; }
    .obtn {
      flex:1; padding:12px 4px; font-family:var(--font); font-size:0.7rem;
      letter-spacing:0.1em; text-transform:uppercase;
      border:1px solid var(--border2); border-radius:2px;
      background:none; color:var(--muted); cursor:pointer; transition:all 0.15s;
    }
    .obtn.sel-hit  { border-color:var(--green); color:var(--green); background:rgba(61,153,112,0.09); }
    .obtn.sel-miss { border-color:var(--red);   color:var(--red);   background:rgba(192,57,43,0.09); }
    .obtn.sel-skip { border-color:var(--muted); color:var(--muted2);background:rgba(90,90,90,0.09); }

    .actual-fields { display:none; }
    .actual-fields.show { display:grid; grid-template-columns:repeat(auto-fit, minmax(140px, 1fr)); gap:8px; margin-top:10px; }

    .prog-badge {
      display:inline-block; font-size:0.64rem; letter-spacing:0.1em; text-transform:uppercase;
      padding:4px 10px; border-radius:1px; margin-top:8px;
    }
    .badge-up   { background:rgba(61,153,112,0.12); color:var(--green); border:1px solid rgba(61,153,112,0.25); }
    .badge-same { background:rgba(90,90,90,0.12);   color:var(--muted2);border:1px solid var(--border); }

    /* BOTTOM BAR */
    .bottom-bar {
      position:fixed; bottom:0; left:0; right:0;
      background:var(--bg); border-top:1px solid var(--border); padding:12px 16px; z-index:50;
    }
    .bottom-inner { max-width:480px; margin:0 auto; display:flex; gap:8px; align-items:center; }
    .bottom-summary { flex:1; font-size:0.7rem; color:var(--muted); line-height:1.5; }
    .bottom-summary strong { color:var(--white); font-weight:500; }
    .btn-finish {
      font-family:var(--font); font-size:0.72rem; font-weight:600; letter-spacing:0.14em;
      text-transform:uppercase; background:var(--amber); color:#0f0f0f;
      border:none; border-radius:2px; padding:14px 22px; cursor:pointer; white-space:nowrap;
    }
    .btn-finish:disabled { background:var(--amber-lo); color:#555; cursor:not-allowed; }

    /* HISTORY */
    .hist-block { border-bottom:1px solid var(--border); padding:14px 16px; }
    .hist-head { display:flex; justify-content:space-between; margin-bottom:10px; }
    .hist-name { font-size:0.9rem; font-weight:500; text-transform:uppercase; letter-spacing:0.06em; }
    .hist-date { font-size:0.68rem; color:var(--muted); }
    .hist-row  { display:flex; justify-content:space-between; font-size:0.75rem; color:var(--muted2); padding:5px 0; }
    .hist-ex   { text-transform:uppercase; letter-spacing:0.04em; color:var(--white); font-size:0.78rem; }
    .dot { width:8px; height:8px; border-radius:50%; display:inline-block; margin-right:6px; vertical-align:middle; }
    .dot-hit  { background:var(--green); }
    .dot-miss { background:var(--red); }
    .dot-skip { background:var(--muted); }

    /* EXPORT */
    .export-wrap { padding:14px 16px; }
    .range-row { display:flex; gap:7px; margin-bottom:12px; }
    .export-out {
      background:var(--surface2); border:1px solid var(--border); color:var(--muted2);
      font-family:var(--font); font-size:0.7rem; padding:12px; border-radius:2px;
      width:100%; height:220px; resize:none; outline:none; line-height:1.65;
    }
    .export-btns { display:flex; gap:8px; margin-top:10px; }

    /* MODAL */
    .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:100; align-items:flex-end; justify-content:center; }
    .overlay.open { display:flex; }
    .modal {
      background:var(--surface); border-top:1px solid var(--border2);
      width:100%; max-width:480px; padding:20px 16px 36px;
      border-radius:4px 4px 0 0; max-height:90dvh; overflow-y:auto;
    }
    .modal-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
    .modal-title { font-size:0.72rem; letter-spacing:0.18em; text-transform:uppercase; color:var(--amber); }
    .modal-close { background:none; border:none; color:var(--muted); cursor:pointer; font-size:1.3rem; line-height:1; }
    .divider { height:1px; background:var(--border); margin:14px 0; }

    /* EXERCISE TYPE SELECTOR */
    .type-row { display:flex; gap:6px; margin-bottom:10px; }
    .type-btn {
      flex:1; padding:9px 4px; font-family:var(--font); font-size:0.62rem;
      letter-spacing:0.06em; text-transform:uppercase;
      border:1px solid var(--border2); border-radius:2px;
      background:none; color:var(--muted); cursor:pointer; transition:all 0.15s;
    }
    .type-btn.sel { border-color:var(--amber); color:var(--amber); background:rgba(245,166,35,0.08); }

    /* EXERCISE FIELD BLOCK */
    .ex-field-block {
      border:1px solid var(--border); border-radius:2px; padding:12px;
      margin-bottom:10px; background:var(--surface2);
    }
    .ex-field-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
    .ex-field-label { font-size:0.62rem; letter-spacing:0.16em; text-transform:uppercase; color:var(--muted); }
    .ex-remove { background:none; border:none; color:var(--muted); cursor:pointer; font-size:1rem; }

    /* TOAST */
    .toast {
      position:fixed; top:16px; left:50%;
      transform:translateX(-50%) translateY(-80px);
      background:var(--surface); border:1px solid var(--border2);
      color:var(--white); font-family:var(--font); font-size:0.72rem;
      letter-spacing:0.06em; padding:10px 18px; border-radius:2px;
      transition:transform 0.22s ease; z-index:300; white-space:nowrap;
    }
    .toast.show { transform:translateX(-50%) translateY(0); }
    .toast.ok  { border-color:var(--green); color:var(--green); }
    .toast.err { border-color:var(--red);   color:var(--red); }

    /* SPINNER */
    .spin {
      display:inline-block; width:10px; height:10px;
      border:2px solid var(--border2); border-top-color:var(--amber);
      border-radius:50%; animation:_spin 0.7s linear infinite;
      margin-right:6px; vertical-align:middle;
    }
    @keyframes _spin { to { transform:rotate(360deg); } }

    /* LOADING OVERLAY */
    .loading-overlay {
      display:none; position:fixed; inset:0; background:rgba(15,15,15,0.7);
      z-index:400; align-items:center; justify-content:center; flex-direction:column; gap:12px;
    }
    .loading-overlay.active { display:flex; }
    .loading-spinner {
      width:28px; height:28px; border:3px solid var(--border2); border-top-color:var(--amber);
      border-radius:50%; animation:_spin 0.7s linear infinite;
    }
    .loading-text {
      font-size:0.68rem; letter-spacing:0.16em; text-transform:uppercase; color:var(--muted2);
    }

    .empty { padding:28px 16px; font-size:0.76rem; color:var(--muted); letter-spacing:0.06em; }
    .gap   { height:100px; }
    .mt8   { margin-top:8px; }
    .mb0   { margin-bottom:0 !important; }
  </style>
</head>
<body>

<!-- ══════════════════ LOGIN ══════════════════ -->
<div class="screen active" id="s-login">
  <div class="centered">
    <div class="c-logo">LOADOUT</div>
    <div class="c-sub">Progressive overload.<br>Every session counts.</div>
    <div class="c-title">Sign in</div>
    <div class="field">
      <label>Email</label>
      <input class="finput" type="email" id="loginEmail" placeholder="you@email.com" inputmode="email" autocomplete="email"/>
    </div>
    <button class="btn btn-primary mt8" id="btnMagic" onclick="sendMagicLink()">Send Magic Link →</button>
    <div style="margin-top:14px;font-size:0.6rem;color:var(--muted);line-height:1.7" id="loginMsg"></div>
  </div>
</div>

<!-- ══════════════════ ONBOARD ══════════════════ -->
<div class="screen" id="s-onboard">
  <div class="centered">
    <div class="c-logo" style="font-size:1.1rem">LOADOUT</div>
    <div class="c-sub" style="margin-bottom:20px">Quick setup — just once.</div>
    <div class="field">
      <label>Your name</label>
      <input class="finput" type="text" id="obName" placeholder="First name" autocomplete="given-name"/>
    </div>
    <div class="row2">
      <div class="field mb0">
        <label>Age</label>
        <input class="finput" type="number" id="obAge" placeholder="35" inputmode="numeric"/>
      </div>
      <div class="field mb0">
        <label>Bodyweight (lbs)</label>
        <input class="finput" type="number" id="obBW" placeholder="175" inputmode="decimal"/>
      </div>
    </div>
    <button class="btn btn-primary mt8" onclick="saveOnboard()" style="margin-top:12px">Let's go →</button>
  </div>
</div>

<!-- ══════════════════ APP ══════════════════ -->
<div class="screen" id="s-app">
  <div class="app-header">
    <span class="logo">LOADOUT</span>
    <span class="hdr-right" id="hdrUser" onclick="openModal('m-profile')">—</span>
  </div>
  <nav class="nav">
    <button class="nav-btn active" id="tab-workouts" onclick="switchTab('workouts')">Workouts</button>
    <button class="nav-btn"        id="tab-history"  onclick="switchTab('history')">History</button>
    <button class="nav-btn"        id="tab-export"   onclick="switchTab('export')">Export</button>
  </nav>

  <!-- WORKOUTS -->
  <div class="pane" id="pane-workouts">
    <div class="pane-inner">
      <div class="slabel">Your Workouts</div>
      <div id="workoutList"><div class="empty">No workouts yet.</div></div>
      <div style="padding:12px 16px">
        <button class="btn btn-ghost btn-full" onclick="openModal('m-new-workout')">+ New Workout</button>
      </div>
      <div class="gap"></div>
    </div>
  </div>

  <!-- HISTORY -->
  <div class="pane" id="pane-history" style="display:none">
    <div class="pane-inner">
      <div class="slabel">Past Sessions</div>
      <div id="historyList"><div class="empty">No sessions yet.</div></div>
      <div class="gap"></div>
    </div>
  </div>

  <!-- EXPORT -->
  <div class="pane" id="pane-export" style="display:none">
    <div class="pane-inner">
      <div class="slabel">Export Readout</div>
      <div class="export-wrap">
        <div class="range-row">
          <button class="btn btn-ghost btn-sm btn-full" onclick="genExport(7)">Past Week</button>
          <button class="btn btn-ghost btn-sm btn-full" onclick="genExport(30)">Past Month</button>
          <button class="btn btn-ghost btn-sm btn-full" onclick="genExport(0)">All Time</button>
        </div>
        <textarea class="export-out" id="exportOut" readonly placeholder="Select a range above..."></textarea>
        <div class="export-btns">
          <button class="btn btn-ghost btn-full" onclick="copyExport()">Copy</button>
          <button class="btn btn-ghost btn-full" onclick="dlExport()">Download</button>
        </div>
      </div>
      <div class="gap"></div>
    </div>
  </div>
</div>

<!-- ══════════════════ SESSION ══════════════════ -->
<div class="screen" id="s-session">
  <div class="app-header">
    <span class="logo" id="sessionTitle">—</span>
    <div style="display:flex;gap:6px">
      <button class="btn btn-ghost btn-sm" id="btnReorder" onclick="toggleReorderMode()">✎ Reorder</button>
      <button class="btn btn-ghost btn-sm" onclick="cancelSession()">← Back</button>
    </div>
  </div>
  <div class="pane" id="sessionBody"></div>
  <div class="bottom-bar">
    <div class="bottom-inner">
      <div class="bottom-summary" id="sessionSummary"><strong>0</strong> / 0 logged</div>
      <button class="btn-finish" id="btnFinish" onclick="finishSession()" disabled>Finish →</button>
    </div>
  </div>
</div>

<!-- ══════════════════ MODALS ══════════════════ -->

<!-- New Workout -->
<div class="overlay" id="m-new-workout">
  <div class="modal">
    <div class="modal-top">
      <span class="modal-title">New Workout</span>

// ══════════════════════════════════════════════════════════
// WORKOUTS
// ══════════════════════════════════════════════════════════
let exCount = 0;

function exType(ex) {
  if (ex.reps < 0) return 'timed';
  if (ex.reps === 0) return 'sets_only';
  return 'standard';
}

function fmtDuration(sec) {
  const total = Math.max(0, Math.floor(Math.abs(sec || 0)));
  const m = Math.floor(total / 60);
  const s = total % 60;
  return m + ':' + String(s).padStart(2, '0');
}

function repsInputHTML(prefix, i, type, repsVal) {
  if (type === 'timed') {
    const total = Math.max(0, Math.abs(parseInt(repsVal) || 0));
    const mins = Math.floor(total / 60);
    const secs = total % 60;
    return `<div class="ms-row">
      <input class="finput ms-input" type="number" id="${prefix}em-${i}" placeholder="0" inputmode="numeric" min="0" value="${total?mins:''}" aria-label="Minutes"/>
      <span class="ms-sep">:</span>
      <input class="finput ms-input" type="number" id="${prefix}er-${i}" placeholder="30" inputmode="numeric" min="0" max="59" value="${total?secs:''}" aria-label="Seconds"/>
    </div>`;
  }
  return `<input class="finput" type="number" id="${prefix}er-${i}" placeholder="5" inputmode="numeric" value="${repsVal||''}"/>`;
}

function readRepsValFromRW(prefix, i) {
  const m = document.getElementById(prefix + 'em-' + i)?.value;
  const s = document.getElementById(prefix + 'er-' + i)?.value;
  if ((m ?? '') !== '' || (s ?? '') !== '') {
    return (parseInt(m) || 0) * 60 + (parseInt(s) || 0);
  }
  return s ?? '';
}

function setExFieldType(prefix, i, type) {
  const block = document.getElementById(prefix + 'exf-' + i);
  if (!block) return;
  const prevType = block.dataset.type || 'standard';
  const prevVal  = readRepsValFromRW(prefix, i);
  block.dataset.type = type;
  block.querySelectorAll('.type-btn').forEach(b => b.classList.toggle('sel', b.dataset.type === type));
  const f2 = document.getElementById(prefix + 'ex-f2-' + i);
  const f3 = document.getElementById(prefix + 'ex-f3-' + i);
  const l2 = document.getElementById(prefix + 'ex-l2-' + i);
  const l3 = document.getElementById(prefix + 'ex-l3-' + i);
  const rw = document.getElementById(prefix + 'ex-rw-' + i);
  const params = document.getElementById(prefix + 'ex-params-' + i);
  if (type === 'sets_only') {
    f2.style.display = 'none'; f3.style.display = 'none';
    params.style.gridTemplateColumns = '1fr';
  } else {
    f2.style.display = ''; f3.style.display = '';
    l2.textContent = type === 'timed' ? 'Min : Sec' : 'Reps';
    l3.textContent = type === 'timed' ? 'Weight (opt)' : 'Start Wt';
    params.style.gridTemplateColumns = '1fr 1fr 1fr';
    if (rw && prevType !== type) rw.innerHTML = repsInputHTML(prefix, i, type, prevVal);
  }
}

function addExField(ex = null) {
  const i = exCount++;
  const type = ex ? exType(ex) : 'standard';
  const repsVal = type === 'timed' ? Math.abs(ex.reps) : (ex?.reps || '');
  const weightVal = ex?.current_weight || ex?.start_weight || '';
  const div = document.createElement('div');
  div.className = 'ex-field-block';
  div.id = 'exf-' + i;
  div.dataset.type = type;
  div.innerHTML = `
    <div class="ex-field-top">
      <span class="ex-field-label">Exercise ${i + 1}</span>
      <button class="ex-remove" onclick="document.getElementById('exf-${i}').remove()">×</button>
    </div>
    <div class="type-row">
      <button class="type-btn ${type==='standard'?'sel':''}" data-type="standard" onclick="event.preventDefault();setExFieldType('','${i}','standard')">Sets x Reps</button>
      <button class="type-btn ${type==='timed'?'sel':''}" data-type="timed" onclick="event.preventDefault();setExFieldType('','${i}','timed')">Timed</button>
      <button class="type-btn ${type==='sets_only'?'sel':''}" data-type="sets_only" onclick="event.preventDefault();setExFieldType('','${i}','sets_only')">Sets Only</button>
    </div>
    <div class="field" style="margin-bottom:8px">
      <input class="finput upper" type="text" id="en-${i}" placeholder="BACK SQUAT" autocorrect="off" value="${ex?.name||''}"/>
    </div>
    <div class="row3" id="ex-params-${i}" style="grid-template-columns:${type==='sets_only'?'1fr':'1fr 1fr 1fr'}">
      <div class="field mb0">
        <label class="flabel">Sets</label>
        <input class="finput" type="number" id="es-${i}" placeholder="3" inputmode="numeric" value="${ex?.sets||''}"/>
      </div>
      <div class="field mb0" id="ex-f2-${i}" style="${type==='sets_only'?'display:none':''}">
        <label class="flabel" id="ex-l2-${i}">${type==='timed'?'Min : Sec':'Reps'}</label>
        <div id="ex-rw-${i}">${repsInputHTML('', i, type, repsVal)}</div>
      </div>
      <div class="field mb0" id="ex-f3-${i}" style="${type==='sets_only'?'display:none':''}">
        <label class="flabel" id="ex-l3-${i}">${type==='timed'?'Weight (opt)':'Start Wt'}</label>
        <input class="finput" type="number" id="ew-${i}" placeholder="${type==='timed'?'0':'135'}" inputmode="decimal" value="${weightVal||''}"/>
      </div>
    </div>
  `;
  document.getElementById('exFields').appendChild(div);
}

async function saveWorkout() {
  const name = document.getElementById('wkName').value.trim().toUpperCase();
  if (!name) { toast('Enter a workout name', 'err'); return; }

  const blocks = document.querySelectorAll('#exFields .ex-field-block');
  const exercises = [];
  let valid = true;

  blocks.forEach(block => {
    const i    = block.id.replace('exf-', '');
    const type = block.dataset.type || 'standard';
    const nm   = (document.getElementById('en-' + i)?.value || '').trim().toUpperCase();
    const s    = parseInt(document.getElementById('es-' + i)?.value);
    if (!nm || isNaN(s)) { valid = false; return; }

    if (type === 'standard') {
      const r = parseInt(document.getElementById('er-' + i)?.value);
      const w = parseFloat(document.getElementById('ew-' + i)?.value);
      if (isNaN(r) || isNaN(w)) { valid = false; return; }
      exercises.push({ name: nm, sets: s, reps: r, start_weight: w, current_weight: w });
    } else if (type === 'timed') {
      const mRaw = document.getElementById('em-' + i)?.value ?? '';
      const sRaw = document.getElementById('er-' + i)?.value ?? '';
      const w    = parseFloat(document.getElementById('ew-' + i)?.value) || 0;
      if (mRaw.trim() === '' && sRaw.trim() === '') { valid = false; return; }
      const dur = (parseInt(mRaw) || 0) * 60 + (parseInt(sRaw) || 0);
      if (dur <= 0) { valid = false; return; }
      exercises.push({ name: nm, sets: s, reps: -dur, start_weight: w, current_weight: w });
    } else {
      exercises.push({ name: nm, sets: s, reps: 0, start_weight: 0, current_weight: 0 });
    }
  });

  if (!valid || exercises.length === 0) { toast('Complete all exercise fields', 'err'); return; }

  await withLoading(async () => {
    // Insert workout
    const { data: wk, error: wkErr } = await sb.from('workouts')
      .insert({ user_id: S.user.id, name })
      .select().single();
    if (wkErr) { toast('Error: ' + wkErr.message, 'err'); return; }

    // Insert exercises
    const exRows = exercises.map((e, idx) => ({ ...e, workout_id: wk.id, user_id: S.user.id, sort_order: idx }));
    const { error: exErr } = await sb.from('exercises').insert(exRows);
    if (exErr) { toast('Error: ' + exErr.message, 'err'); return; }

    await loadWorkouts();
    renderWorkouts();
    closeModal('m-new-workout');
    document.getElementById('wkName').value = '';
    document.getElementById('exFields').innerHTML = '';
    exCount = 0;
    toast('Workout saved', 'ok');
  }, 'Saving workout...');
}

// ══════════════════════════════════════════════════════════
// EDIT / DELETE WORKOUTS
// ══════════════════════════════════════════════════════════
let _openMenu = null;
function toggleCardMenu(id) {
  const menu = document.getElementById('cmenu-' + id);
  if (_openMenu && _openMenu !== menu) _openMenu.classList.remove('open');
  menu.classList.toggle('open');
  _openMenu = menu.classList.contains('open') ? menu : null;
}
document.addEventListener('click', () => {
  if (_openMenu) { _openMenu.classList.remove('open'); _openMenu = null; }
});

let editExCount = 0;
let editWorkoutId = null;

function addEditExField(ex = null) {
  const i = editExCount++;
  const type = ex ? exType(ex) : 'standard';
  const repsVal = type === 'timed' ? Math.abs(ex.reps) : (ex?.reps || '');
  const weightVal = ex?.current_weight || ex?.start_weight || '';
  const div = document.createElement('div');
  div.className = 'ex-field-block';
  div.id = 'eexf-' + i;
  div.dataset.type = type;
  div.innerHTML = `
    <div class="ex-field-top">
      <span class="ex-field-label">Exercise ${i + 1}</span>
      <button class="ex-remove" onclick="document.getElementById('eexf-${i}').remove()">×</button>
    </div>
    <div class="type-row">
      <button class="type-btn ${type==='standard'?'sel':''}" data-type="standard" onclick="event.preventDefault();setExFieldType('e','${i}','standard')">Sets x Reps</button>
      <button class="type-btn ${type==='timed'?'sel':''}" data-type="timed" onclick="event.preventDefault();setExFieldType('e','${i}','timed')">Timed</button>
      <button class="type-btn ${type==='sets_only'?'sel':''}" data-type="sets_only" onclick="event.preventDefault();setExFieldType('e','${i}','sets_only')">Sets Only</button>
    </div>
    <div class="field" style="margin-bottom:8px">
      <input class="finput upper" type="text" id="een-${i}" placeholder="BACK SQUAT" autocorrect="off" value="${ex?.name||''}"/>
    </div>
    <div class="row3" id="eex-params-${i}" style="grid-template-columns:${type==='sets_only'?'1fr':'1fr 1fr 1fr'}">
      <div class="field mb0">
        <label class="flabel">Sets</label>
        <input class="finput" type="number" id="ees-${i}" placeholder="3" inputmode="numeric" value="${ex?.sets||''}"/>
      </div>
      <div class="field mb0" id="eex-f2-${i}" style="${type==='sets_only'?'display:none':''}">
        <label class="flabel" id="eex-l2-${i}">${type==='timed'?'Min : Sec':'Reps'}</label>
        <div id="eex-rw-${i}">${repsInputHTML('e', i, type, repsVal)}</div>
      </div>
      <div class="field mb0" id="eex-f3-${i}" style="${type==='sets_only'?'display:none':''}">
        <label class="flabel" id="eex-l3-${i}">${type==='timed'?'Weight (opt)':'Weight'}</label>
        <input class="finput" type="number" id="eew-${i}" placeholder="${type==='timed'?'0':'135'}" inputmode="decimal" value="${weightVal||''}"/>
      </div>
    </div>
  `;
  document.getElementById('editExFields').appendChild(div);
}

function openEditWorkout(id) {
  const w = S.workouts.find(x => x.id === id);
  if (!w) return;
  if (_openMenu) { _openMenu.classList.remove('open'); _openMenu = null; }
  editWorkoutId = id;
  editExCount = 0;
  document.getElementById('editWkName').value = w.name;
  document.getElementById('editExFields').innerHTML = '';
  (w.exercises || []).forEach(ex => addEditExField(ex));
  openModal('m-edit-workout');
}

async function updateWorkout() {
  const name = document.getElementById('editWkName').value.trim().toUpperCase();
  if (!name) { toast('Enter a workout name', 'err'); return; }

  const blocks = document.querySelectorAll('#editExFields .ex-field-block');
  const exercises = [];
  let valid = true;

  blocks.forEach(block => {
    const i    = block.id.replace('eexf-', '');
    const type = block.dataset.type || 'standard';
    const nm   = (document.getElementById('een-' + i)?.value || '').trim().toUpperCase();
    const s    = parseInt(document.getElementById('ees-' + i)?.value);
    if (!nm || isNaN(s)) { valid = false; return; }

    if (type === 'standard') {
      const r = parseInt(document.getElementById('eer-' + i)?.value);
      const w = parseFloat(document.getElementById('eew-' + i)?.value);
      if (isNaN(r) || isNaN(w)) { valid = false; return; }
      exercises.push({ name: nm, sets: s, reps: r, start_weight: w, current_weight: w });
    } else if (type === 'timed') {
      const mRaw = document.getElementById('eem-' + i)?.value ?? '';
      const sRaw = document.getElementById('eer-' + i)?.value ?? '';
      const w    = parseFloat(document.getElementById('eew-' + i)?.value) || 0;
      if (mRaw.trim() === '' && sRaw.trim() === '') { valid = false; return; }
      const dur = (parseInt(mRaw) || 0) * 60 + (parseInt(sRaw) || 0);
      if (dur <= 0) { valid = false; return; }
      exercises.push({ name: nm, sets: s, reps: -dur, start_weight: w, current_weight: w });
    } else {
      exercises.push({ name: nm, sets: s, reps: 0, start_weight: 0, current_weight: 0 });
    }
  });

  if (!valid || exercises.length === 0) { toast('Complete all exercise fields', 'err'); return; }

  await withLoading(async () => {
    // Update workout name
    const { error: wkErr } = await sb.from('workouts').update({ name }).eq('id', editWorkoutId);
    if (wkErr) { toast('Error: ' + wkErr.message, 'err'); return; }

    // Delete old exercises and insert new ones
    const { error: delErr } = await sb.from('exercises').delete().eq('workout_id', editWorkoutId);
    if (delErr) { toast('Error: ' + delErr.message, 'err'); return; }

    const exRows = exercises.map((e, idx) => ({
      ...e, workout_id: editWorkoutId, user_id: S.user.id, sort_order: idx
    }));
    const { error: exErr } = await sb.from('exercises').insert(exRows);
    if (exErr) { toast('Error: ' + exErr.message, 'err'); return; }

    await loadWorkouts();
    renderWorkouts();
    closeModal('m-edit-workout');
    toast('Workout updated', 'ok');
  }, 'Saving changes...');
}

async function deleteWorkout(id) {
  if (_openMenu) { _openMenu.classList.remove('open'); _openMenu = null; }
  const w = S.workouts.find(x => x.id === id);
  if (!w || !confirm(`Delete "${w.name}"? This cannot be undone.`)) return;

  await withLoading(async () => {
    // Delete exercises first, then workout
    await sb.from('exercises').delete().eq('workout_id', id);
    const { error } = await sb.from('workouts').delete().eq('id', id);
    if (error) { toast('Error: ' + error.message, 'err'); return; }

    await loadWorkouts();
    renderWorkouts();
    toast('Workout deleted', 'ok');
  }, 'Deleting...');
}

function renderWorkouts() {
  const list = document.getElementById('workoutList');
  if (S.workouts.length === 0) {
    list.innerHTML = '<div class="empty">No workouts yet. Create one below.</div>';
    return;
  }
  list.innerHTML = S.workouts.map(w => `
    <div class="card" onclick="startSession('${w.id}')">
      <div class="card-head">
        <div class="card-left">
          <span class="card-name">${w.name}</span>
          <span class="card-meta">${w.exercises?.length || 0} exercise${w.exercises?.length !== 1 ? 's' : ''}</span>
        </div>
        <div class="card-menu-wrap">
          <button class="card-menu-btn" onclick="event.stopPropagation();toggleCardMenu('${w.id}')">...</button>
          <div class="card-menu" id="cmenu-${w.id}">
            <button class="card-menu-item" onclick="event.stopPropagation();openEditWorkout('${w.id}')">Edit</button>
            <button class="card-menu-item danger" onclick="event.stopPropagation();deleteWorkout('${w.id}')">Delete</button>
          </div>
        </div>
      </div>
      <div class="card-chips">
        ${(w.exercises || []).map(e => {
          const t = exType(e);
          const suffix = t === 'timed' ? ' · timed' : t === 'sets_only' ? ' · sets' : '';
          return `<span class="chip">${e.name}${suffix}</span>`;
        }).join('')}
      </div>
    </div>
  `).join('');
}

// ══════════════════════════════════════════════════════════

async function startSession(workoutId) {
  const workout = S.workouts.find(w => w.id === workoutId);
  if (!workout) return;
  S.active = { workout, outcomes: {}, date: isoDate(new Date()), warmup: new Set(), cooldown: new Set() };
  S.reorderMode = false;
  const rb = document.getElementById('btnReorder');
  if (rb) { rb.textContent = '✎ Reorder'; rb.classList.remove('active'); }
  document.getElementById('sessionBody').classList.remove('reorder-mode');
  document.getElementById('sessionTitle').textContent = workout.name;
  renderSession();
  show('s-session');
  updateSummary();
  await loadSessionMeta();
  renderWarmupCooldown();
}

async function toggleReorderMode() {
  if (!S.active) return;
  S.reorderMode = !S.reorderMode;
  const btn = document.getElementById('btnReorder');
  const body = document.getElementById('sessionBody');
  if (S.reorderMode) {
    btn.textContent = 'Done';
    btn.classList.add('active');
    body.classList.add('reorder-mode');

let _dragBlock = null;

function enableReorderDnd() {
  const list = document.getElementById('exerciseList');
  if (!list) return;
  list.querySelectorAll('.sex-block').forEach(b => {
    const handle = b.querySelector('.drag-handle');
    if (!handle) return;
    handle.addEventListener('pointerdown', e => startReorderDrag(e, b));
  });
}

function startReorderDrag(e, block) {
  e.preventDefault();
  _dragBlock = block;
  block.classList.add('dragging');
  try { block.setPointerCapture(e.pointerId); } catch(_) {}
  const move = ev => onReorderMove(ev, block);
  const end  = () => {
    block.classList.remove('dragging');
    block.removeEventListener('pointermove', move);
    block.removeEventListener('pointerup', end);
    block.removeEventListener('pointercancel', end);
    _dragBlock = null;
  };
  block.addEventListener('pointermove', move);
  block.addEventListener('pointerup', end);
  block.addEventListener('pointercancel', end);
}

function onReorderMove(e, block) {
  const container = block.parentElement;
  const y = e.clientY;
  const siblings = Array.from(container.querySelectorAll('.sex-block')).filter(s => s !== block);
  for (const sib of siblings) {
    const rect = sib.getBoundingClientRect();
    if (y < rect.top + rect.height / 2) {
      container.insertBefore(block, sib);
      return;
    }
  }
  const last = siblings[siblings.length - 1];
  if (last && last.nextSibling !== block) container.appendChild(block);
}

async function persistReorder() {
  if (!S.active) return;
  const workout = S.active.workout;
  const ordered = Array.from(document.querySelectorAll('#exerciseList .sex-block'))
    .map(b => b.dataset.exid)
    .filter(Boolean);
  if (!ordered.length) return;
  const updates = [];
  ordered.forEach((exid, idx) => {
    const ex = workout.exercises.find(e => e.id === exid);
    if (ex && ex.sort_order !== idx) {
      ex.sort_order = idx;
      updates.push({ id: ex.id, sort_order: idx });
    }
  });
  if (!updates.length) return;
  workout.exercises.sort((a, b) => (a.sort_order ?? 0) - (b.sort_order ?? 0));
  try {
    for (const u of updates) {
      await sb.from('exercises').update({ sort_order: u.sort_order }).eq('id', u.id);
    }
    toast('Order saved', 'ok');
  } catch (e) {
    toast('Error saving order: ' + e.message, 'err');
  }
}

const WARMUP_ITEMS = [
  { id: 'leg_swings',   label: 'Leg swings',               detail: '10 each side' },
  { id: 'hip_circles',  label: 'Hip circles',              detail: '10 each side' },
  { id: 'arm_circles',  label: 'Arm circles',              detail: '10 each side' },
  { id: 'light_cardio', label: 'Light cardio / jump rope', detail: '5 min' },
];
const COOLDOWN_BASE = [
  { id: 'hip_flexor', label: 'Hip flexor stretch', detail: '1 min each side' },
  { id: 'cat_cow',    label: 'Cat-cow',            detail: '10 reps' },
  { id: 'cobra',      label: 'Cobra press-up',     detail: '10 reps' },
];
const COOLDOWN_LEGS = [
  { id: 'hamstring', label: 'Hamstring stretch', detail: '1 min each side' },
  { id: 'glute',     label: 'Glute stretch',     detail: '1 min each side' },
];
const COOLDOWN_UPPER = [
  { id: 'chest_doorframe', label: 'Chest/pec doorframe stretch', detail: '1 min' },
  { id: 'lat_overhead',    label: 'Lat overhead stretch',        detail: '1 min each side' },
];
const LEG_KEYWORDS   = ['SQUAT', 'RDL', 'LUNGE', 'LEG EXTENSION', 'LEG CURL'];
const UPPER_KEYWORDS = ['CHEST PRESS', 'SHOULDER PRESS', 'SEATED ROW', 'ROWS', 'BICEP CURL', 'PULL-UP', 'PULLUP', 'PULL UP'];

function cooldownItemsFor(exercises) {
  const names = (exercises || []).map(e => (e.name || '').toUpperCase());
  const hasLegs  = names.some(n => LEG_KEYWORDS.some(k => n.includes(k)));
  const hasUpper = names.some(n => UPPER_KEYWORDS.some(k => n.includes(k)));
  return [...COOLDOWN_BASE, ...(hasLegs ? COOLDOWN_LEGS : []), ...(hasUpper ? COOLDOWN_UPPER : [])];
}

async function loadSessionMeta() {
  if (!S.active) return;
  const { workout, date } = S.active;
  S.active.warmup = new Set();
  S.active.cooldown = new Set();
  try {
    const { data } = await sb.from('session_meta')
      .select('*')
      .eq('user_id', S.user.id)
      .eq('workout_id', workout.id)
      .eq('date', date)
      .maybeSingle();
    if (data) {
      S.active.warmup   = new Set(data.warmup_done   || []);
      S.active.cooldown = new Set(data.cooldown_done || []);
    }
  } catch (e) { /* table may not exist yet */ }
}

async function saveSessionMeta() {
  if (!S.active) return;
  const { workout, date } = S.active;
  try {
    await sb.from('session_meta').upsert({
      user_id: S.user.id,
      workout_id: workout.id,
      date,
      warmup_done:   Array.from(S.active.warmup   || []),
      cooldown_done: Array.from(S.active.cooldown || []),
    }, { onConflict: 'user_id,workout_id,date' });
  } catch (e) { /* table may not exist yet */ }
}

function renderWCCard(kind, items, done, collapsed) {
  const checked = items.filter(it => done.has(it.id)).length;
  const rows = items.map(it => `
    <div class="wc-row ${done.has(it.id) ? 'checked' : ''}" onclick="toggleWCItem('${kind}','${it.id}')">
      <span class="wc-check"></span>
      <span class="wc-label">${it.label} <em>${it.detail}</em></span>
    </div>`).join('');
  return `
    <div class="wc-card ${collapsed ? 'collapsed' : ''}" id="${kind}Card">
      <button class="wc-head" onclick="toggleWC('${kind}')">
        <span>${kind.toUpperCase()}</span>
        <span class="wc-count">${checked}/${items.length}</span>
        <span class="wc-chev">▾</span>
      </button>
      <div class="wc-body">${rows}</div>
    </div>`;
}

function renderWarmupCooldown() {
  if (!S.active) return;
  const wCol = document.getElementById('warmupContainer');
  const cCol = document.getElementById('cooldownContainer');
  if (!wCol || !cCol) return;
  const cooldownItems = cooldownItemsFor(S.active.workout.exercises);

function toggleWC(kind) {

  document.getElementById(kind + 'Card')?.classList.toggle('collapsed');

function toggleWCItem(kind, id) {

  if (set.has(id)) set.delete(id); else set.add(id);

function renderExerciseListHTML() {
  return (S.active.workout.exercises || []).map(ex => {
    const type = exType(ex);
    const targetStr = type === 'timed'
      ? `${ex.sets} × ${fmtDuration(ex.reps)}${ex.current_weight > 0 ? ' @ ' + ex.current_weight + ' lbs' : ''}`
      : type === 'sets_only'
      ? `${ex.sets} set${ex.sets !== 1 ? 's' : ''}`
      : `${ex.sets}×${ex.reps}${ex.current_weight > 0 ? ' @ ' + ex.current_weight + ' lbs' : ''}`;
    const showWeight = type !== 'sets_only' && ex.current_weight > 0;
    const showReps   = type !== 'sets_only';
    const targetSec  = Math.abs(ex.reps);
    const targetMin  = Math.floor(targetSec / 60);
    const targetRem  = targetSec % 60;
    const repsFieldHTML = type === 'timed'
      ? `<div class="field mb0">
          <label class="flabel">Actual Time (min : sec)</label>
          <div class="ms-row">
            <input class="finput ms-input" type="number" id="am-${ex.id}" value="${targetMin}" inputmode="numeric" min="0" aria-label="Minutes"/>

          <label class="flabel">Actual Reps</label>

    return `
      <div class="sex-block" id="sx-${ex.id}" data-exid="${ex.id}">

        <div class="sex-head">
          <span class="sex-name">${ex.name}</span>
          <span class="sex-target">Target: <em>${targetStr}</em></span>
        </div>
        <div class="outcome-row">
          <button class="obtn" id="ob-hit-${ex.id}"  onclick="setOutcome('${ex.id}','hit')">✓ Hit</button>
          <button class="obtn" id="ob-miss-${ex.id}" onclick="setOutcome('${ex.id}','miss')">✗ Miss</button>
          <button class="obtn" id="ob-skip-${ex.id}" onclick="setOutcome('${ex.id}','skip')">— Skip</button>
        </div>

          ${showWeight ? `<div class="field mb0">
            <label class="flabel">Actual Weight</label>
            <input class="finput" type="number" id="aw-${ex.id}" value="${ex.current_weight}" inputmode="decimal"/>

function setOutcome(exId, outcome) {
  const cur = S.active.outcomes[exId]?.outcome;
  // Toggle off
  if (cur === outcome) {
    delete S.active.outcomes[exId];
    ['hit','miss','skip'].forEach(o => document.getElementById(`ob-${o}-${exId}`)?.classList.remove(`sel-${o}`));
    document.getElementById('af-' + exId)?.classList.remove('show');
    document.getElementById('pb-' + exId).innerHTML = '';
    updateSummary(); return;
  }

  S.active.outcomes[exId] = { outcome };
  ['hit','miss','skip'].forEach(o => {
    const b = document.getElementById(`ob-${o}-${exId}`);
    b?.classList.remove(`sel-hit`,`sel-miss`,`sel-skip`);
    if (o === outcome) b?.classList.add(`sel-${o}`);
  });

  const ex   = S.active.workout.exercises.find(e => e.id === exId);
  const type = exType(ex);
  const af   = document.getElementById('af-' + exId);

  if (type === 'sets_only') {
    af?.classList.remove('show');
  } else {
    outcome !== 'skip' ? af?.classList.add('show') : af?.classList.remove('show');
  }

  // Progression badge
  const pb = document.getElementById('pb-' + exId);
  if (type === 'standard' && ex.current_weight > 0) {
    if (outcome === 'hit') {
      const next = calcNext(ex, S.profile);
      pb.innerHTML = `<span class="prog-badge badge-up">Next session: ${next} lbs (+${(next - ex.current_weight).toFixed(1)})</span>`;
    } else if (outcome === 'miss') {
      pb.innerHTML = `<span class="prog-badge badge-same">Next session: ${ex.current_weight} lbs — repeat</span>`;
    } else {
      pb.innerHTML = `<span class="prog-badge badge-same">Next session: ${ex.current_weight} lbs — unchanged</span>`;
    }
  } else if (type === 'timed') {
    const curSec = Math.abs(ex.reps);
    if (outcome === 'hit') {
      const nextSec = calcNextTimed(curSec);
      pb.innerHTML = `<span class="prog-badge badge-up">Next session: ${fmtDuration(nextSec)} (+${fmtDuration(nextSec - curSec)})</span>`;
    } else if (outcome === 'miss') {
      pb.innerHTML = `<span class="prog-badge badge-same">Next session: ${fmtDuration(curSec)} — repeat</span>`;
    } else {
      pb.innerHTML = `<span class="prog-badge badge-same">Next session: ${fmtDuration(curSec)} — unchanged</span>`;
    }
  } else {
    pb.innerHTML = '';
  }

  updateSummary();
}

function updateSummary() {
  const total = S.active?.workout.exercises?.length || 0;
  const done  = Object.keys(S.active?.outcomes || {}).length;
  document.getElementById('sessionSummary').innerHTML = `<strong>${done}</strong> / ${total} logged`;
  document.getElementById('btnFinish').disabled = done === 0;
}

async function finishSession() {
  const { workout, outcomes, date } = S.active;
  const logs = [];
  const exUpdates = [];

  for (const ex of workout.exercises) {
    const type = exType(ex);
    const o = outcomes[ex.id] || { outcome: 'skip' };

    const actualWt = (type !== 'sets_only' && ex.current_weight > 0)
      ? (parseFloat(document.getElementById('aw-' + ex.id)?.value) || ex.current_weight)
      : ex.current_weight;
    let actualReps;
    if (type === 'sets_only') {
      actualReps = 0;
    } else if (type === 'timed') {
      const mRaw = document.getElementById('am-' + ex.id)?.value ?? '';
      const sRaw = document.getElementById('as-' + ex.id)?.value ?? '';
      const entered = (parseInt(mRaw) || 0) * 60 + (parseInt(sRaw) || 0);
      actualReps = entered > 0 || mRaw.trim() !== '' || sRaw.trim() !== '' ? entered : Math.abs(ex.reps);
    } else {
      actualReps = parseInt(document.getElementById('ar-' + ex.id)?.value) || ex.reps;
    }
    const nextWt = (type === 'standard' && ex.current_weight > 0 && o.outcome === 'hit')
      ? calcNext(ex, S.profile)
      : ex.current_weight;
    const nextReps = (type === 'timed' && o.outcome === 'hit')
      ? -calcNextTimed(Math.abs(ex.reps))
      : ex.reps;

    logs.push({
      user_id: S.user.id, workout_id: workout.id, exercise_id: ex.id,
      workout_name: workout.name, exercise_name: ex.name,
      date, sets_target: ex.sets, reps_target: ex.reps, weight_target: ex.current_weight,
      outcome: o.outcome,
      actual_weight: o.outcome !== 'skip' && type !== 'sets_only' ? actualWt : null,
      actual_reps:   o.outcome !== 'skip' && type !== 'sets_only' ? actualReps : null,
      next_weight: nextWt,
    });

    const patch = {};
    if (nextWt !== ex.current_weight) patch.current_weight = nextWt;
    if (nextReps !== ex.reps)         patch.reps           = nextReps;
    if (Object.keys(patch).length)    exUpdates.push({ id: ex.id, patch });
  }

  const btn = document.getElementById('btnFinish');
  btn.disabled = true; btn.innerHTML = '<span class="spin"></span>Saving...';

  try {
    const { error: logErr } = await sb.from('session_logs').insert(logs);
    if (logErr) throw logErr;

    // Apply exercise updates (weight progression and/or timed duration progression)
    for (const { id, patch } of exUpdates) {
      await sb.from('exercises').update(patch).eq('id', id);
    }

    // Update local state
    exUpdates.forEach(({ id, patch }) => {
      const ex = workout.exercises.find(e => e.id === id);
      if (ex) Object.assign(ex, patch);
    });

    await loadSessions();
    renderWorkouts();
    showSessionSummary(outcomes, workout);
  } catch (e) {
    toast('Error: ' + e.message, 'err');
  } finally {
    btn.disabled = false; btn.textContent = 'Finish →';
  }
}

async function cancelSession() {
  if (Object.keys(S.active?.outcomes || {}).length > 0 && !confirm('Discard this session?')) return;
  if (S.reorderMode) await persistReorder();
  S.reorderMode = false;
  S.active = null;
  show('s-app');
}

function showSessionSummary(outcomes, workout) {
  const hit  = Object.values(outcomes).filter(o => o.outcome === 'hit').length;
  const miss = Object.values(outcomes).filter(o => o.outcome === 'miss').length;
  const skip = (workout.exercises || []).length - hit - miss;
  const warmup   = S.active?.warmup   || new Set();
  const cooldown = S.active?.cooldown || new Set();
  const cdItems  = cooldownItemsFor(workout.exercises);
  const warmupAll   = WARMUP_ITEMS.every(it => warmup.has(it.id));
  const cooldownAll = cdItems.every(it => cooldown.has(it.id));
  const body = document.getElementById('summaryBody');
  body.innerHTML = `
    <div class="summary-row"><span>Workout</span><span class="summary-val">${workout.name}</span></div>
    <div class="summary-row"><span>Hit</span><span class="summary-val ok">${hit}</span></div>
    <div class="summary-row"><span>Miss</span><span class="summary-val ${miss?'no':''}">${miss}</span></div>
    <div class="summary-row"><span>Skip</span><span class="summary-val">${skip}</span></div>
    <div class="summary-row"><span>Warmup</span><span class="summary-val ${warmupAll?'ok':'no'}">${warmupAll ? '✓ complete' : `${warmup.size}/${WARMUP_ITEMS.length}`}</span></div>
    <div class="summary-row"><span>Cooldown</span><span class="summary-val ${cooldownAll?'ok':'no'}">${cooldownAll ? '✓ complete' : `${cooldown.size}/${cdItems.length}`}</span></div>
  `;
  openModal('m-summary');
}

  closeModal('m-summary');
  S.active = null;
  S.reorderMode = false;
  show('s-app');

}

// ══════════════════════════════════════════════════════════
// PROGRESSION LOGIC
// ══════════════════════════════════════════════════════════
function calcNext(ex, profile) {
  const w    = ex.current_weight;
  const reps = ex.reps;
  const age  = profile?.age || 30;
  const bw   = profile?.bw  || 175;
  const ratio = w / bw;

  // Increment by relative strength level
  let inc;
  if      (ratio < 0.75) inc = 10;
  else if (ratio < 1.5)  inc = 5;
  else if (ratio < 2.5)  inc = 2.5;
  else                   inc = 1.25;

  // Age taper
  if (age > 50) inc *= 0.70;
  else if (age > 40) inc *= 0.85;

  // High-rep work progresses slower
  if (reps > 8) inc *= 0.75;

  // Round to nearest 2.5 lbs
  return Math.round((w + inc) / 2.5) * 2.5;
}

function calcNextTimed(curSec) {
  const inc = curSec < 60 ? 15 : 30;
  return curSec + inc;
}

function renderHistory() {
  const list = document.getElementById('historyList');
  if (!S.sessions.length) { list.innerHTML = '<div class="empty">No sessions yet.</div>'; return; }

  // Group by date + workout
  const groups = {};
  S.sessions.forEach(r => {
    const key = r.date + '|' + r.workout_name;
    if (!groups[key]) groups[key] = { date: r.date, name: r.workout_name, rows: [] };
    groups[key].rows.push(r);
  });

  list.innerHTML = Object.values(groups).reverse().map(g => `
    <div class="hist-block">
      <div class="hist-head">
        <span class="hist-name">${g.name}</span>
        <span class="hist-date">${g.date}</span>
      </div>
      ${g.rows.map(r => {
        const rt = r.reps_target < 0 ? 'timed' : r.reps_target === 0 ? 'sets_only' : 'standard';
        let detail;
        if (r.outcome === 'skip') { detail = 'skipped'; }
        else if (rt === 'sets_only') { detail = r.outcome === 'hit' ? 'completed' : 'missed'; }
        else if (rt === 'timed') { detail = (r.actual_weight > 0 ? r.actual_weight + ' lbs · ' : '') + fmtDuration(r.actual_reps); }
        else { detail = r.actual_weight + ' lbs × ' + r.actual_reps; }
        return `<div class="hist-row">
          <span><span class="dot dot-${r.outcome}"></span><span class="hist-ex">${r.exercise_name}</span></span>
          <span>${detail}</span>
        </div>`;
      }).join('')}
    </div>
  `).join('');
}

// ══════════════════════════════════════════════════════════
// EXPORT
// ══════════════════════════════════════════════════════════
function genExport(days) {
  const cutoff = days > 0 ? new Date(Date.now() - days * 864e5) : new Date(0);
  const rows   = S.sessions.filter(r => new Date(r.date) >= cutoff);

  if (!rows.length) { document.getElementById('exportOut').value = 'No sessions in this range.'; return; }

  const label = days === 7 ? 'PAST 7 DAYS' : days === 30 ? 'PAST 30 DAYS' : 'ALL TIME';
  let out = `LOADOUT EXPORT — ${label}\n`;
  out    += `User: ${S.profile?.name} · BW: ${S.profile?.bw} lbs · Age: ${S.profile?.age}\n`;
  out    += `Generated: ${isoDate(new Date())}\n`;
  out    += '─'.repeat(44) + '\n\n';

  // Group
  const groups = {};
  rows.forEach(r => {
    const key = r.date + '|' + r.workout_name;
    if (!groups[key]) groups[key] = { date: r.date, name: r.workout_name, rows: [] };
    groups[key].rows.push(r);
  });

  Object.values(groups).reverse().forEach(g => {
    out += `[${g.date}] ${g.name}\n`;
    g.rows.forEach(r => {
      const rt  = r.reps_target < 0 ? 'timed' : r.reps_target === 0 ? 'sets_only' : 'standard';
      const tag = r.outcome === 'hit' ? '✓' : r.outcome === 'miss' ? '✗' : '—';
      let actual, next = '';
      if (r.outcome === 'skip') { actual = 'skipped'; }
      else if (rt === 'sets_only') { actual = r.outcome === 'hit' ? 'completed' : 'missed'; }
      else if (rt === 'timed') {
        actual = (r.actual_weight > 0 ? r.actual_weight + ' lbs × ' : '') + fmtDuration(r.actual_reps);
        if (r.next_weight > 0) next = ` → next: ${r.next_weight} lbs`;
      } else {
        actual = `${r.actual_weight} lbs × ${r.actual_reps} reps`;
        next = ` → next: ${r.next_weight} lbs`;
      }
      out += `  ${tag} ${r.exercise_name.padEnd(22)} ${actual}${next}\n`;
    });
    out += '\n';
  });

  const hit   = rows.filter(r => r.outcome === 'hit').length;
  const miss  = rows.filter(r => r.outcome === 'miss').length;
  const skip  = rows.filter(r => r.outcome === 'skip').length;
  const done  = rows.length - skip;
  out += '─'.repeat(44) + '\n';
  out += `Sessions: ${Object.keys(groups).length} · Sets hit: ${hit}/${done} (${done ? Math.round(hit/done*100) : 0}%) · Misses: ${miss} · Skipped: ${skip}\n`;

  document.getElementById('exportOut').value = out;
}

function copyExport() {
  const txt = document.getElementById('exportOut').value;
  if (!txt || txt.includes('Select a range')) return;
  navigator.clipboard?.writeText(txt).catch(() => {
    document.getElementById('exportOut').select();
    document.execCommand('copy');
  });
  toast('Copied!', 'ok');
}

function dlExport() {
  const txt = document.getElementById('exportOut').value;
  if (!txt || txt.includes('Select a range')) return;
  const a = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(new Blob([txt], { type: 'text/plain' })),
    download: `loadout-${isoDate(new Date())}.txt`,
  });
  a.click();
}

// ══════════════════════════════════════════════════════════
// DATA
// ══════════════════════════════════════════════════════════
async function loadData() {
  await Promise.all([loadWorkouts(), loadSessions()]);
  renderWorkouts();
  renderHistory();
}

async function loadWorkouts() {
  const { data, error } = await sb.from('workouts')
    .select('*, exercises(*)')
    .eq('user_id', S.user.id)
    .order('created_at');
  if (!error) {
    (data || []).forEach(w => {
      (w.exercises || []).sort((a, b) => (a.sort_order ?? 0) - (b.sort_order ?? 0));
    });
    S.workouts = data || [];
  }
}

async function loadSessions() {
  const { data, error } = await sb.from('session_logs')
    .select('*')
    .eq('user_id', S.user.id)
    .order('date', { ascending: false })
    .order('created_at', { ascending: false })
    .limit(500);
  if (!error) S.sessions = data || [];
}

async function loadProfile() {
  const { data } = await sb.from('profiles').select('*').eq('id', S.user.id).single();
  return data;
}

// ══════════════════════════════════════════════════════════
// UI HELPERS
// ══════════════════════════════════════════════════════════
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id)?.classList.add('active');
}

function switchTab(name) {
  ['workouts','history','export'].forEach(t => {
    document.getElementById('pane-' + t).style.display = t === name ? 'block' : 'none';
    document.getElementById('tab-'  + t)?.classList.toggle('active', t === name);
  });
  if (name === 'history') renderHistory();
}

function openModal(id)  { document.getElementById(id)?.classList.add('open'); }
function closeModal(id) { document.getElementById(id)?.classList.remove('open'); }

document.querySelectorAll('.overlay').forEach(o => {
  o.addEventListener('click', e => { if (e.target === o) o.classList.remove('open'); });
});

// Loading overlay — only shows if operation takes >200ms
let _loadTimer = null;
function showLoading(msg = 'Loading...') {
  const el = document.getElementById('loadingOverlay');
  el.querySelector('.loading-text').textContent = msg;
  _loadTimer = setTimeout(() => el.classList.add('active'), 200);
}
function hideLoading() {
  clearTimeout(_loadTimer);
  document.getElementById('loadingOverlay').classList.remove('active');
}
async function withLoading(fn, msg) {
  showLoading(msg);
  try { return await fn(); } finally { hideLoading(); }
}

let _tt;
function toast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show ' + type;
  clearTimeout(_tt); _tt = setTimeout(() => { t.className = 'toast'; }, 2600);
}

function isoDate(d) { return d.toISOString().split('T')[0]; }

// ══════════════════════════════════════════════════════════
// INIT — Supabase handles the magic link redirect automatically
// ══════════════════════════════════════════════════════════
(async () => {
  showLoading('Loading...');
  try {
    const { data: { session } } = await sb.auth.getSession();

    if (session?.user) {
      S.user    = session.user;
      S.profile = await loadProfile();
      if (!S.profile) { show('s-onboard'); return; }
      await loadData();
      show('s-app');
      updateHeader();
    } else {
      show('s-login');
    }
  } catch (e) {
    toast('Load error: ' + e.message, 'err');
    show('s-login');
  } finally {
    hideLoading();
  }

  // Listen for auth state changes (magic link click lands here)
  sb.auth.onAuthStateChange(async (event, session) => {
    if ((event === 'SIGNED_IN' || event === 'TOKEN_REFRESHED') && session?.user) {
      S.user = session.user;
      // Already loaded — silently refresh data, don't disrupt UI
      if (S.profile) {
        loadData().catch(() => {});
        return;
      }
      // First sign-in: full load flow
      showLoading('Loading...');
      try {
        S.profile = await loadProfile();
        if (!S.profile) { show('s-onboard'); return; }
        await loadData();
        show('s-app');
        updateHeader();
      } catch (e) {
        toast('Load error: ' + e.message, 'err');
      } finally {
        hideLoading();
      }
    }
    if (event === 'SIGNED_OUT') { show('s-login'); }
  });
})();
</script>
